<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="mic" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="48" y="24" width="32" height="48" rx="16" fill="url(#mic)"/>
  <!-- Stand arc -->
  <path d="M38 60 a26 26 0 0 0 52 0" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <!-- Stand line -->
  <line x1="64" y1="86" x2="64" y2="100" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="50" y1="100" x2="78" y2="100" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <!-- Sound waves -->
  <path d="M28 44 a8 14 0 0 0 0 28" fill="none" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M18 38 a12 22 0 0 0 0 40" fill="none" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <path d="M100 44 a8 14 0 0 1 0 28" fill="none" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M110 38 a12 22 0 0 1 0 40" fill="none" stroke="#c7d2fe" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
</svg>
